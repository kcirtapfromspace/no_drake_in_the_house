name: Publish Render Backend Image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-backend-image.yml
      - backend/**
      - render.yaml
      - scripts/publish-render-backend-image.sh
  workflow_dispatch:
    inputs:
      deploy_to_render:
        description: Trigger the Render deploy hook after publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: render-backend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPO: ghcr.io/kcirtapfromspace/ndith-backend

jobs:
  publish:
    name: Publish ${{ matrix.service.label }} Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - label: API
            render_service_name: ndith-backend
            backend_bin: music-streaming-blocklist-backend
            cargo_features: render-api
            cargo_no_default_features: true
            latest_tag: latest
            sha_tag_prefix: ""
            use_deploy_hook: true
          - label: Analytics
            render_service_name: ndith-analytics
            backend_bin: ndith-analytics-service
            cargo_features: analytics
            cargo_no_default_features: true
            latest_tag: analytics-latest
            sha_tag_prefix: analytics-
            use_deploy_hook: false
          - label: Graph
            render_service_name: ndith-graph
            backend_bin: ndith-graph-service
            cargo_features: graph-ladybugdb
            cargo_no_default_features: true
            latest_tag: graph-latest
            sha_tag_prefix: graph-
            use_deploy_hook: false
          - label: News
            render_service_name: ndith-news
            backend_bin: ndith-news-service
            cargo_features: news
            cargo_no_default_features: true
            latest_tag: news-latest
            sha_tag_prefix: news-
            use_deploy_hook: false
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_NDITH_BACKEND_DEPLOY_HOOK_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space for Rust native builds
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive build variables
        id: vars
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_REPO}:${{ matrix.service.sha_tag_prefix }}${GITHUB_SHA::7}"
            if [ "${GITHUB_REF}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
              echo "${IMAGE_REPO}:${{ matrix.service.latest_tag }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.vars.outputs.tags }}
          build-args: |
            BACKEND_BIN=${{ matrix.service.backend_bin }}
            BACKEND_CARGO_FEATURES=${{ matrix.service.cargo_features }}
            BACKEND_CARGO_NO_DEFAULT_FEATURES=${{ matrix.service.cargo_no_default_features }}
          cache-from: type=gha,scope=render-backend-image-${{ matrix.service.render_service_name }}
          cache-to: type=gha,mode=max,scope=render-backend-image-${{ matrix.service.render_service_name }}

      - name: Deploy to Render
        id: render_deploy
        if: ${{ matrix.service.use_deploy_hook && env.RENDER_DEPLOY_HOOK_URL != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_to_render != 'false') }}
        shell: bash
        env:
          IMG_TAG: ${{ matrix.service.sha_tag_prefix }}${{ steps.vars.outputs.short_sha }}
        run: |
          echo "Triggering Render deploy..."
          curl --fail --silent --show-error "${RENDER_DEPLOY_HOOK_URL}"
          echo "Render deploy triggered."

      - name: Summarize published tags
        run: |
          echo "Published ${{ matrix.service.label }} image tags:"
          echo "${{ steps.vars.outputs.tags }}"
