name: Publish Render Backend Image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-backend-image.yml
      - backend/**
      - render.yaml
      - scripts/publish-render-backend-image.sh
  workflow_dispatch:
    inputs:
      deploy_to_render:
        description: Trigger the Render deploy hook after publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: render-backend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPO: ghcr.io/kcirtapfromspace/ndith-backend

jobs:
  publish:
    name: Publish ${{ matrix.service.label }} Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - label: API
            render_service_name: ndith-backend
            backend_bin: music-streaming-blocklist-backend
            cargo_features: render-api
            cargo_no_default_features: true
            latest_tag: latest
            sha_tag_prefix: ""
            use_deploy_hook: true
          - label: Analytics
            render_service_name: ndith-analytics
            backend_bin: ndith-analytics-service
            cargo_features: analytics
            cargo_no_default_features: true
            latest_tag: analytics-latest
            sha_tag_prefix: analytics-
            use_deploy_hook: false
          - label: Graph
            render_service_name: ndith-graph
            backend_bin: ndith-graph-service
            cargo_features: graph-ladybugdb
            cargo_no_default_features: true
            latest_tag: graph-latest
            sha_tag_prefix: graph-
            use_deploy_hook: false
          - label: News
            render_service_name: ndith-news
            backend_bin: ndith-news-service
            cargo_features: news
            cargo_no_default_features: true
            latest_tag: news-latest
            sha_tag_prefix: news-
            use_deploy_hook: false
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_NDITH_BACKEND_DEPLOY_HOOK_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space for Rust native builds
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive build variables
        id: vars
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_REPO}:${{ matrix.service.sha_tag_prefix }}${GITHUB_SHA::7}"
            if [ "${GITHUB_REF}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
              echo "${IMAGE_REPO}:${{ matrix.service.latest_tag }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.vars.outputs.tags }}
          build-args: |
            BACKEND_BIN=${{ matrix.service.backend_bin }}
            BACKEND_CARGO_FEATURES=${{ matrix.service.cargo_features }}
            BACKEND_CARGO_NO_DEFAULT_FEATURES=${{ matrix.service.cargo_no_default_features }}
          cache-from: type=gha,scope=render-backend-image-${{ matrix.service.render_service_name }}
          cache-to: type=gha,mode=max,scope=render-backend-image-${{ matrix.service.render_service_name }}

      - name: Deploy to Render
        id: render_deploy
        if: ${{ env.RENDER_API_KEY != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_to_render != 'false') }}
        shell: bash
        env:
          SERVICE_NAME: ${{ matrix.service.render_service_name }}
          IMG_TAG: ${{ matrix.service.sha_tag_prefix }}${{ steps.vars.outputs.short_sha }}
          USE_HOOK: ${{ matrix.service.use_deploy_hook }}
        run: |
          # Step 1: Resolve service ID via Render API
          echo "Resolving Render service '${SERVICE_NAME}'..."
          response="$(
            curl --silent --show-error --write-out "\n%{http_code}" \
              --url "https://api.render.com/v1/services" \
              --header "Authorization: Bearer ${RENDER_API_KEY}"
          )"
          http_code="$(echo "${response}" | tail -1)"
          body="$(echo "${response}" | sed '$d')"

          if [ "${http_code}" -ge 400 ]; then
            echo "::warning::Render API returned HTTP ${http_code}. Regenerate RENDER_API_KEY in Render dashboard → Account Settings → API Keys."
          fi

          service_id="$(
            echo "${body}" | jq -r --arg target "${SERVICE_NAME}" '
              (if type == "array" then .
               elif type == "object" then (.services // .items // .results // [.])
               else []
               end)
              | map(if (.service | type) == "object" then .service else . end)
              | map(select(.name == $target) | .id)
              | .[0] // empty
            ' 2>/dev/null || true
          )"

          # Step 2: Deploy via API if service found
          if [ -n "${service_id}" ]; then
            echo "Deploying ${SERVICE_NAME} (${service_id}) with image ${IMAGE_REPO}:${IMG_TAG}..."
            curl --fail --silent --show-error \
              --request POST \
              --url "https://api.render.com/v1/services/${service_id}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Content-Type: application/json" \
              --data "{\"imageUrl\": \"${IMAGE_REPO}:${IMG_TAG}\"}"
            echo "Render API deploy triggered for ${SERVICE_NAME}."
            exit 0
          fi

          # Step 3: Fall back to deploy hook
          if [ "${USE_HOOK}" = "true" ] && [ -n "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "Service not found via API. Trying deploy hook..."
            curl --fail --silent --show-error \
              "${RENDER_DEPLOY_HOOK_URL}?imgURL=${IMAGE_REPO}:${IMG_TAG}"
            echo "Render deploy hook triggered."
            exit 0
          fi

          echo "::error::Could not deploy ${SERVICE_NAME}. Render API key returned ${http_code} and no deploy hook configured. Fix RENDER_API_KEY or RENDER_NDITH_BACKEND_DEPLOY_HOOK_URL in GitHub secrets."
          exit 1

      - name: Summarize published tags
        run: |
          echo "Published ${{ matrix.service.label }} image tags:"
          echo "${{ steps.vars.outputs.tags }}"
          if [ -n "${{ steps.render_service.outputs.service_id }}" ]; then
            echo "Triggered Render API deploy for ${{ matrix.service.render_service_name }} (${{ steps.render_service.outputs.service_id }})"
          elif [ "${{ matrix.service.use_deploy_hook }}" = "true" ] && [ -n "${RENDER_DEPLOY_HOOK_URL}" ] && [ "${GITHUB_REF}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "Triggered Render deploy hook fallback for ${{ matrix.service.render_service_name }}"
          elif [ -n "${RENDER_API_KEY}" ] && [ "${GITHUB_REF}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "Render service ${{ matrix.service.render_service_name }} is not available yet; image published only."
          elif [ -n "${RENDER_DEPLOY_HOOK_URL}" ] || [ -n "${RENDER_API_KEY}" ]; then
            echo "Render deploy credentials configured, but skipped because this is not the default branch."
          else
            echo "Render deploy hook/API key not configured; image publish only."
          fi
