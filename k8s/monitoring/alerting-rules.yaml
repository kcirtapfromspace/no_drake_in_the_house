apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: ndith-production
data:
  ndith-alerts.yml: |
    groups:
    - name: ndith-api
      rules:
      - alert: NDITHAPIDown
        expr: up{job="ndith-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NDITH API is down"
          description: "NDITH API has been down for more than 1 minute"
          
      - alert: NDITHAPIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="ndith-api"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NDITH API high latency"
          description: "95th percentile latency is above 1 second for 5 minutes"
          
      - alert: NDITHAPIHighErrorRate
        expr: rate(http_requests_total{job="ndith-api",status=~"5.."}[5m]) / rate(http_requests_total{job="ndith-api"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "NDITH API high error rate"
          description: "Error rate is above 5% for 2 minutes"
          
      - alert: NDITHAPIMemoryUsage
        expr: container_memory_usage_bytes{pod=~"ndith-api-.*"} / container_spec_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NDITH API high memory usage"
          description: "Memory usage is above 90% for 5 minutes"
          
    - name: ndith-worker
      rules:
      - alert: NDITHWorkerDown
        expr: up{job="ndith-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "NDITH Worker is down"
          description: "NDITH Worker has been down for more than 2 minutes"
          
      - alert: NDITHWorkerJobQueueBacklog
        expr: ndith_job_queue_size > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "NDITH Worker job queue backlog"
          description: "Job queue has more than 1000 pending jobs for 10 minutes"
          
      - alert: NDITHWorkerJobFailureRate
        expr: rate(ndith_job_failures_total[5m]) / rate(ndith_job_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NDITH Worker high job failure rate"
          description: "Job failure rate is above 10% for 5 minutes"
          
    - name: ndith-database
      rules:
      - alert: NDITHDatabaseConnectionsHigh
        expr: ndith_database_connections_active / ndith_database_connections_max > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NDITH Database connections high"
          description: "Database connection usage is above 80% for 5 minutes"
          
      - alert: NDITHDatabaseSlowQueries
        expr: rate(ndith_database_query_duration_seconds_sum[5m]) / rate(ndith_database_query_duration_seconds_count[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NDITH Database slow queries"
          description: "Average query duration is above 1 second for 5 minutes"
          
    - name: ndith-external-apis
      rules:
      - alert: SpotifyAPIRateLimit
        expr: ndith_spotify_rate_limit_remaining < 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Spotify API rate limit low"
          description: "Spotify API rate limit remaining is below 100"
          
      - alert: ExternalAPIFailureRate
        expr: rate(ndith_external_api_errors_total[5m]) / rate(ndith_external_api_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "External API high failure rate"
          description: "External API failure rate is above 10% for 5 minutes"