apiVersion: apps/v1
kind: Deployment
metadata:
  name: ndith-worker
  namespace: ndith-production
  labels:
    app: ndith-worker
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: ndith-worker
  template:
    metadata:
      labels:
        app: ndith-worker
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ndith-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: worker
        image: ndith/worker:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: WORKER_MODE
          value: "enforcement"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ndith-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ndith-secrets
              key: REDIS_URL
        - name: KMS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: ndith-secrets
              key: KMS_KEY_ID
        - name: SPOTIFY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ndith-secrets
              key: SPOTIFY_CLIENT_SECRET
        - name: APPLE_MUSIC_TEAM_ID
          valueFrom:
            secretKeyRef:
              name: ndith-secrets
              key: APPLE_MUSIC_TEAM_ID
        - name: APPLE_MUSIC_KEY_ID
          valueFrom:
            secretKeyRef:
              name: ndith-secrets
              key: APPLE_MUSIC_KEY_ID
        - name: APPLE_MUSIC_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: ndith-secrets
              key: APPLE_MUSIC_PRIVATE_KEY
        envFrom:
        - configMapRef:
            name: ndith-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      nodeSelector:
        kubernetes.io/os: linux
