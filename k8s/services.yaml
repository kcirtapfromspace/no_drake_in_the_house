apiVersion: v1
kind: Service
metadata:
  name: ndith-api-service
  namespace: ndith-production
  labels:
    app: ndith-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: ndith-api

---
apiVersion: v1
kind: Service
metadata:
  name: ndith-worker-service
  namespace: ndith-production
  labels:
    app: ndith-worker
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: ndith-worker

---
apiVersion: v1
kind: Service
metadata:
  name: ndith-api-headless
  namespace: ndith-production
  labels:
    app: ndith-api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: ndith-api