name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RENDER_BACKEND_CARGO_FEATURES: render-api

jobs:
  render-backend-image-smoke:
    name: Render Backend Image Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space for Rust native builds
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build slim Render backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: false
          provenance: false
          sbom: false
          build-args: |
            BACKEND_CARGO_FEATURES=${{ env.RENDER_BACKEND_CARGO_FEATURES }}
            BACKEND_CARGO_NO_DEFAULT_FEATURES=true
          cache-from: type=gha,scope=ci-render-backend-image
          cache-to: type=gha,mode=max,scope=ci-render-backend-image

  # Workspace-wide Rust quality gates
  backend-rust-quality:
    name: Backend Rust Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: backend
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

  # Package- and feature-level Rust builds. These are package build lanes until
  # the backend is split into separately deployed services.
  backend-component-build:
    name: Backend Component Builds (${{ matrix.target.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: api
            command: cargo build -p music-streaming-blocklist-backend --bin music-streaming-blocklist-backend
          - name: api-render
            command: cargo build -p music-streaming-blocklist-backend --bin music-streaming-blocklist-backend --no-default-features --features render-api
          - name: core
            command: cargo build -p ndith-core
          - name: db
            command: cargo build -p ndith-db
          - name: services
            command: cargo build -p ndith-services
          - name: news
            command: cargo build -p ndith-news
          - name: analytics
            command: cargo build -p ndith-analytics --no-default-features
          - name: analytics-graph-ladybugdb
            command: cargo build -p ndith-analytics --features graph-ladybugdb
          - name: api-graph-ladybugdb
            command: cargo build -p music-streaming-blocklist-backend --bin music-streaming-blocklist-backend --features graph-ladybugdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build backend component
        working-directory: backend
        env:
          SQLX_OFFLINE: true
          RUST_LOG: warn
        run: ${{ matrix.target.command }}

  # Package- and feature-level Rust coverage
  backend-component-test:
    name: Backend Component Tests (${{ matrix.target.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: api
            command: cargo test -p music-streaming-blocklist-backend
          - name: core
            command: cargo test -p ndith-core
          - name: db
            command: cargo test -p ndith-db
          - name: services
            command: cargo test -p ndith-services
          - name: news
            command: cargo test -p ndith-news
          - name: analytics
            command: cargo test -p ndith-analytics --no-default-features
          - name: analytics-graph-ladybugdb
            command: cargo test -p ndith-analytics --no-default-features --features graph-ladybugdb

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run backend component coverage
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          RUST_LOG: warn
        run: ${{ matrix.target.command }}

  # Frontend unit tests
  frontend-unit-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linting
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        working-directory: frontend
        run: npm test -- --run

  # E2E browser tests
  e2e-test:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs: [render-backend-image-smoke, backend-rust-quality, backend-component-build, backend-component-test, frontend-unit-test]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build backend
        working-directory: backend
        run: cargo build --release -p music-streaming-blocklist-backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          RUST_LOG: warn
          PORT: 3000
        run: |
          ./target/release/music-streaming-blocklist-backend &
          sleep 10
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3000/health

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:5000
          E2E_SKIP_SERVER: false
        run: npx playwright test --project=chromium --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: frontend/test-results/
          retention-days: 7

  # Cross-browser E2E tests (runs on main branch only)
  e2e-cross-browser:
    name: Cross-Browser E2E Tests
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build backend
        working-directory: backend
        run: cargo build --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          RUST_LOG: warn
          PORT: 3000
        run: |
          ./target/release/music-streaming-blocklist-backend &
          sleep 10
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3000/health

      - name: Run E2E tests (${{ matrix.browser }})
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:5000
          E2E_SKIP_SERVER: false
        run: npx playwright test --project=${{ matrix.browser }} --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/playwright-report/
          retention-days: 30

  # Apple Music API Sandbox Tests
  # Validates Apple Music API interactions against real Apple Music API
  # Only runs when Apple Music secrets are configured
  apple-music-sandbox:
    name: Apple Music Sandbox Tests
    runs-on: ubuntu-latest
    needs: [backend-component-build, backend-component-test]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Apple Music credentials
        id: check-creds
        run: |
          if [[ -n "${{ secrets.APPLE_MUSIC_TEAM_ID }}" ]] && \
             [[ -n "${{ secrets.APPLE_MUSIC_KEY_ID }}" ]] && \
             [[ -n "${{ secrets.APPLE_MUSIC_PRIVATE_KEY }}" ]]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
            echo "::warning::Apple Music credentials not configured. Skipping sandbox tests."
          fi

      - name: Install Rust toolchain
        if: steps.check-creds.outputs.has_credentials == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        if: steps.check-creds.outputs.has_credentials == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Apple Music private key
        if: steps.check-creds.outputs.has_credentials == 'true'
        run: |
          echo "${{ secrets.APPLE_MUSIC_PRIVATE_KEY }}" > /tmp/apple_music_key.p8

      - name: Run Apple Music sandbox tests
        if: steps.check-creds.outputs.has_credentials == 'true'
        working-directory: backend
        env:
          APPLE_MUSIC_TEAM_ID: ${{ secrets.APPLE_MUSIC_TEAM_ID }}
          APPLE_MUSIC_KEY_ID: ${{ secrets.APPLE_MUSIC_KEY_ID }}
          APPLE_MUSIC_KEY_PATH: /tmp/apple_music_key.p8
          APPLE_MUSIC_SANDBOX_TEST: "1"
        run: |
          cargo test --test apple_music_sandbox_tests -- --ignored --nocapture

      - name: Cleanup private key
        if: always()
        run: rm -f /tmp/apple_music_key.p8

  # Summary job
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend-rust-quality, backend-component-build, backend-component-test, frontend-unit-test, e2e-test]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-rust-quality.result }}" != "success" ]] || \
             [[ "${{ needs.backend-component-build.result }}" != "success" ]] || \
             [[ "${{ needs.backend-component-test.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-unit-test.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-test.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
