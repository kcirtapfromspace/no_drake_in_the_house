previews:
  generation: off

services:
  - type: web
    name: ndith-backend
    runtime: image
    plan: starter
    image:
      url: docker.io/kcirtapfromspace/ndith-backend:latest
    healthCheckPath: /health
    domains:
      - api.nodrakeinthe.house
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: RUST_LOG
        value: info,music_streaming_blocklist_backend=debug
      - key: DATABASE_URL
        fromDatabase:
          name: ndith-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ndith-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OAUTH_ENCRYPTION_KEY
        sync: false
      - key: KMS_MOCK_MASTER_KEY
        sync: false
      - key: OAUTH_FRONTEND_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: keyvalue
    name: ndith-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: ndith-frontend
    runtime: docker
    plan: starter
    rootDir: frontend
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /render-health
    domains:
      - nodrakeinthe.house
    envVars:
      - key: BACKEND_HOSTPORT
        fromService:
          type: web
          name: ndith-backend
          property: hostport

databases:
  - name: ndith-postgres
    databaseName: ndith
    user: ndith
    plan: basic-256mb
