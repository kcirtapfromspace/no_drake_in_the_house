# Public API plus internal scoped services for analytics, graph, and news.
previews:
  generation: off

services:
  - type: web
    name: ndith-backend
    runtime: image
    plan: starter
    image:
      url: ghcr.io/kcirtapfromspace/ndith-backend:latest
    healthCheckPath: /health
    domains:
      - api.nodrakeinthe.house
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RUST_LOG
        value: info,music_streaming_blocklist_backend=debug
      - key: DATABASE_URL
        fromDatabase:
          name: ndith-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ndith-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OAUTH_ENCRYPTION_KEY
        sync: false
      - key: KMS_MOCK_MASTER_KEY
        sync: false
      - key: OAUTH_FRONTEND_BASE_URL
        value: https://nodrakeinthe.house
      - key: OAUTH_BACKEND_BASE_URL
        value: https://api.nodrakeinthe.house
      - key: CORS_ALLOWED_ORIGINS
        value: https://nodrakeinthe.house
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        value: https://api.nodrakeinthe.house/auth/callback/spotify
      - key: APPLE_MUSIC_TEAM_ID
        sync: false
      - key: APPLE_MUSIC_KEY_ID
        sync: false
      - key: APPLE_MUSIC_PRIVATE_KEY
        sync: false
      - key: APPLE_MUSIC_BUNDLE_ID
        value: com.nodrakeinthehouse
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: APPLE_PRIVATE_KEY
        sync: false
      - key: APPLE_REDIRECT_URI
        value: https://api.nodrakeinthe.house/auth/callback/apple
      - key: TIDAL_CLIENT_ID
        sync: false
      - key: TIDAL_CLIENT_SECRET
        sync: false
      - key: TIDAL_CLIENT_UNIQUE_KEY
        sync: false
      - key: TIDAL_REDIRECT_URI
        value: https://api.nodrakeinthe.house/auth/callback/tidal
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://api.nodrakeinthe.house/auth/callback/google
      - key: YOUTUBE_MUSIC_CLIENT_ID
        sync: false
      - key: YOUTUBE_MUSIC_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_MUSIC_REDIRECT_URI
        value: https://api.nodrakeinthe.house/auth/callback/youtube
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        value: https://api.nodrakeinthe.house/auth/callback/github

  - type: web
    name: ndith-analytics
    runtime: image
    plan: starter
    image:
      url: ghcr.io/kcirtapfromspace/ndith-backend:analytics-latest
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RUST_LOG
        value: info,music_streaming_blocklist_backend=debug
      - key: DATABASE_URL
        fromDatabase:
          name: ndith-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ndith-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: ndith-backend
          envVarKey: JWT_SECRET
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: ndith-backend
          envVarKey: CORS_ALLOWED_ORIGINS

  - type: web
    name: ndith-graph
    runtime: image
    plan: starter
    image:
      url: ghcr.io/kcirtapfromspace/ndith-backend:graph-latest
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RUST_LOG
        value: info,music_streaming_blocklist_backend=debug
      - key: DATABASE_URL
        fromDatabase:
          name: ndith-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ndith-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: ndith-backend
          envVarKey: JWT_SECRET
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: ndith-backend
          envVarKey: CORS_ALLOWED_ORIGINS

  - type: web
    name: ndith-news
    runtime: image
    plan: starter
    image:
      url: ghcr.io/kcirtapfromspace/ndith-backend:news-latest
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RUST_LOG
        value: info,music_streaming_blocklist_backend=debug
      - key: DATABASE_URL
        fromDatabase:
          name: ndith-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ndith-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: ndith-backend
          envVarKey: JWT_SECRET
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: ndith-backend
          envVarKey: CORS_ALLOWED_ORIGINS

  - type: keyvalue
    name: ndith-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: ndith-frontend
    runtime: image
    image:
      url: ghcr.io/kcirtapfromspace/ndith-frontend:latest
    plan: starter
    healthCheckPath: /render-health
    domains:
      - nodrakeinthe.house
    envVars:
      - key: BACKEND_UPSTREAM_URL
        fromService:
          type: web
          name: ndith-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: ANALYTICS_UPSTREAM_URL
        fromService:
          type: web
          name: ndith-analytics
          envVarKey: RENDER_EXTERNAL_URL
      - key: GRAPH_UPSTREAM_URL
        fromService:
          type: web
          name: ndith-graph
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEWS_UPSTREAM_URL
        fromService:
          type: web
          name: ndith-news
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_CONVEX_URL
        sync: false

databases:
  - name: ndith-postgres
    databaseName: ndith
    user: ndith
    plan: basic-256mb
