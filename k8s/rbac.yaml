apiVersion: v1
kind: ServiceAccount
metadata:
  name: ndith-api
  namespace: ndith-production
  labels:
    app: ndith-api

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ndith-worker
  namespace: ndith-production
  labels:
    app: ndith-worker

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: ndith-production
  name: ndith-api-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: ndith-production
  name: ndith-worker-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ndith-api-rolebinding
  namespace: ndith-production
subjects:
- kind: ServiceAccount
  name: ndith-api
  namespace: ndith-production
roleRef:
  kind: Role
  name: ndith-api-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ndith-worker-rolebinding
  namespace: ndith-production
subjects:
- kind: ServiceAccount
  name: ndith-worker
  namespace: ndith-production
roleRef:
  kind: Role
  name: ndith-worker-role
  apiGroup: rbac.authorization.k8s.io