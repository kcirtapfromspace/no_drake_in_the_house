services:
  postgres:
    image: postgres:15
    container_name: ndith-postgres
    environment:
      POSTGRES_DB: ndith_dev
      POSTGRES_USER: ndith
      POSTGRES_PASSWORD: ndith_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndith -d ndith_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ndith-network

  redis:
    image: redis:7-alpine
    container_name: ndith-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ndith-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ndith-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://ndith:ndith_dev_password@postgres:5432/ndith_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production
      RUST_LOG: debug
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ndith-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ndith-frontend
    ports:
      - "5001:5000"
    environment:
      VITE_API_URL: http://ndith-backend:3000
      NODE_ENV: development
    networks:
      - ndith-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  cargo_cache:
    driver: local
  cargo_target:
    driver: local
  node_modules:
    driver: local

networks:
  ndith-network:
    driver: bridge