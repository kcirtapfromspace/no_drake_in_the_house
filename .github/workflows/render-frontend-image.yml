name: Publish Render Frontend Image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-frontend-image.yml
      - frontend/**
      - render.yaml
  workflow_dispatch:
    inputs:
      deploy_to_render:
        description: Trigger the Render deploy after publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: render-frontend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPO: ghcr.io/kcirtapfromspace/ndith-frontend

jobs:
  publish:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive build variables
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_REPO}:${GITHUB_SHA::7}"
            if [ "${GITHUB_REF}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
              echo "${IMAGE_REPO}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.render
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha,scope=render-frontend-image
          cache-to: type=gha,mode=max,scope=render-frontend-image

      - name: Resolve Render frontend service id
        id: render_service
        if: ${{ env.RENDER_API_KEY != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_to_render != 'false') }}
        run: |
          response="$(
            curl --fail --silent --show-error \
              --url "https://api.render.com/v1/services" \
              --header "Authorization: Bearer ${RENDER_API_KEY}"
          )"

          service_id="$(
            jq -r '
              (if type == "array" then .
               elif type == "object" then (.services // .items // .results // [.])
               else []
               end)
              | map(if (.service | type) == "object" then .service else . end)
              | map(select(.name == "ndith-frontend") | .id)
              | .[0] // empty
            ' <<<"${response}"
          )"

          if [ -n "${service_id}" ]; then
            echo "service_id=${service_id}" >> "$GITHUB_OUTPUT"
            echo "Resolved Render frontend service id: ${service_id}"
          else
            echo "::warning::Render frontend service not found; image published only."
          fi

      - name: Trigger Render frontend deploy
        if: ${{ steps.render_service.outputs.service_id != '' }}
        run: |
          deploy_response="$(
            curl --fail --silent --show-error \
              --request POST \
              --url "https://api.render.com/v1/services/${{ steps.render_service.outputs.service_id }}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Content-Type: application/json" \
              --data '{"imageUrl": "'"${IMAGE_REPO}:${{ steps.vars.outputs.short_sha }}"'"}'
          )"
          echo "Deploy response: ${deploy_response}"
          deploy_status="$(echo "${deploy_response}" | jq -r '.status // empty')"
          deploy_id="$(echo "${deploy_response}" | jq -r '.id // empty')"
          echo "Deploy ID: ${deploy_id}, Status: ${deploy_status}"
          if [ "${deploy_status}" = "build_failed" ] || [ "${deploy_status}" = "deactivated" ]; then
            echo "::error::Render deploy failed with status: ${deploy_status}"
            exit 1
          fi

      - name: Summarize
        run: |
          echo "Published frontend image tags:"
          echo "${{ steps.vars.outputs.tags }}"
          if [ -n "${{ steps.render_service.outputs.service_id }}" ]; then
            echo "Triggered Render deploy for ndith-frontend (${{ steps.render_service.outputs.service_id }})"
          else
            echo "Image published to GHCR only."
          fi
