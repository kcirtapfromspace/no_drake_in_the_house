name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RENDER_BACKEND_CARGO_FEATURES: render-api

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      backend_quality: ${{ steps.detect.outputs.backend_quality }}
      backend_quality_targets: ${{ steps.detect.outputs.backend_quality_targets }}
      render_smoke: ${{ steps.detect.outputs.render_smoke }}
      frontend: ${{ steps.detect.outputs.frontend }}
      e2e: ${{ steps.detect.outputs.e2e }}
      apple_music_sandbox: ${{ steps.detect.outputs.apple_music_sandbox }}
      backend_build_required: ${{ steps.detect.outputs.backend_build_required }}
      backend_test_required: ${{ steps.detect.outputs.backend_test_required }}
      backend_build_matrix: ${{ steps.detect.outputs.backend_build_matrix }}
      backend_test_matrix: ${{ steps.detect.outputs.backend_test_matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${GITHUB_SHA}"
            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              base="$(git rev-list --max-parents=0 "$head")"
            fi
          fi

          git diff --name-only "$base" "$head" > changed_files.txt

          echo "Changed files:"
          cat changed_files.txt || true

          has_any_change() {
            for pattern in "$@"; do
              if grep -Eq "$pattern" changed_files.txt; then
                return 0
              fi
            done
            return 1
          }

          frontend=false
          backend_any=false
          render_smoke=false
          backend_quality=false
          e2e=false
          apple_music_sandbox=false
          api_package=false
          api_render=false
          api_full=false
          core=false
          db=false
          services=false
          analytics=false
          news=false

          if has_any_change '^frontend/'; then
            frontend=true
          fi

          if has_any_change '^backend/'; then
            backend_any=true
            backend_quality=true
          fi

          if has_any_change '^backend/' '^render\.yaml$'; then
            render_smoke=true
          fi

          if has_any_change '^backend/crates/ndith-core/' '^backend/Cargo\.toml$' '^backend/Cargo\.lock$'; then
            core=true
          fi

          if has_any_change '^backend/crates/ndith-db/' '^backend/migrations/' '^backend/Cargo\.toml$' '^backend/Cargo\.lock$'; then
            db=true
          fi

          if has_any_change '^backend/crates/ndith-services/' '^backend/Cargo\.toml$' '^backend/Cargo\.lock$'; then
            services=true
          fi

          if has_any_change '^backend/crates/ndith-analytics/' '^backend/Cargo\.toml$' '^backend/Cargo\.lock$'; then
            analytics=true
          fi

          if has_any_change '^backend/crates/ndith-news/' '^backend/Cargo\.toml$' '^backend/Cargo\.lock$'; then
            news=true
          fi

          if has_any_change '^backend/src/' '^backend/tests/' '^backend/Cargo\.toml$' '^backend/Cargo\.lock$'; then
            api_package=true
          fi

          if has_any_change '^backend/src/' '^backend/tests/' '^backend/Cargo\.toml$' '^backend/Cargo\.lock$' '^backend/crates/ndith-core/' '^backend/crates/ndith-db/' '^backend/crates/ndith-services/' '^backend/migrations/'; then
            api_render=true
          fi

          if [[ "$api_render" == "true" || "$analytics" == "true" || "$news" == "true" ]]; then
            api_full=true
          fi

          if [[ "$frontend" == "true" || "$api_render" == "true" ]]; then
            e2e=true
          fi

          if has_any_change '^backend/tests/apple_music_sandbox_tests\.rs$' '^backend/crates/ndith-services/src/apple_music.*' '^backend/crates/ndith-services/src/oauth_apple.*' '^backend/src/handlers/oauth.*' '^backend/Cargo\.toml$' '^backend/Cargo\.lock$'; then
            apple_music_sandbox=true
          fi

          add_json_target() {
            python3 -c 'import json, sys; items = json.loads(sys.argv[1]); name = sys.argv[2]; items.append(name) if name not in items else None; print(json.dumps(items, separators=(",", ":")))' "$1" "$2"
          }

          backend_quality_targets='[]'
          backend_build_matrix='[]'
          backend_test_matrix='[]'

          if [[ "$api_package" == "true" ]]; then
            backend_quality_targets="$(add_json_target "$backend_quality_targets" api-render)"
          fi

          if [[ "$api_render" == "true" ]]; then
            backend_build_matrix="$(add_json_target "$backend_build_matrix" api-render)"
          fi

          if [[ "$api_full" == "true" ]]; then
            backend_build_matrix="$(add_json_target "$backend_build_matrix" api)"
            backend_test_matrix="$(add_json_target "$backend_test_matrix" api)"
            backend_build_matrix="$(add_json_target "$backend_build_matrix" api-graph-ladybugdb)"
          fi

          if [[ "$core" == "true" ]]; then
            backend_quality_targets="$(add_json_target "$backend_quality_targets" core)"
            backend_build_matrix="$(add_json_target "$backend_build_matrix" core)"
            backend_test_matrix="$(add_json_target "$backend_test_matrix" core)"
          fi

          if [[ "$db" == "true" ]]; then
            backend_quality_targets="$(add_json_target "$backend_quality_targets" db)"
            backend_build_matrix="$(add_json_target "$backend_build_matrix" db)"
            backend_test_matrix="$(add_json_target "$backend_test_matrix" db)"
          fi

          if [[ "$services" == "true" ]]; then
            backend_quality_targets="$(add_json_target "$backend_quality_targets" services)"
            backend_build_matrix="$(add_json_target "$backend_build_matrix" services)"
            backend_test_matrix="$(add_json_target "$backend_test_matrix" services)"
          fi

          if [[ "$news" == "true" ]]; then
            backend_quality_targets="$(add_json_target "$backend_quality_targets" news)"
            backend_build_matrix="$(add_json_target "$backend_build_matrix" news)"
            backend_test_matrix="$(add_json_target "$backend_test_matrix" news)"
          fi

          if [[ "$analytics" == "true" ]]; then
            backend_quality_targets="$(add_json_target "$backend_quality_targets" analytics)"
            backend_quality_targets="$(add_json_target "$backend_quality_targets" analytics-graph-ladybugdb)"
            backend_build_matrix="$(add_json_target "$backend_build_matrix" analytics)"
            backend_test_matrix="$(add_json_target "$backend_test_matrix" analytics)"
            backend_build_matrix="$(add_json_target "$backend_build_matrix" analytics-graph-ladybugdb)"
            backend_test_matrix="$(add_json_target "$backend_test_matrix" analytics-graph-ladybugdb)"
          fi

          if [[ "$backend_quality_targets" == "[]" ]]; then
            backend_quality=false
          fi

          if [[ "$backend_build_matrix" == "[]" ]]; then
            backend_build_required=false
          else
            backend_build_required=true
          fi

          if [[ "$backend_test_matrix" == "[]" ]]; then
            backend_test_required=false
          else
            backend_test_required=true
          fi

          {
            echo "backend_quality=$backend_quality"
            echo "backend_quality_targets=$backend_quality_targets"
            echo "render_smoke=$render_smoke"
            echo "frontend=$frontend"
            echo "e2e=$e2e"
            echo "apple_music_sandbox=$apple_music_sandbox"
            echo "backend_build_required=$backend_build_required"
            echo "backend_test_required=$backend_test_required"
            echo "backend_build_matrix=$backend_build_matrix"
            echo "backend_test_matrix=$backend_test_matrix"
          } >> "$GITHUB_OUTPUT"

  render-backend-image-smoke:
    name: Render Backend Image Smoke
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.render_smoke == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space for Rust native builds
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build slim Render backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: false
          provenance: false
          sbom: false
          build-args: |
            BACKEND_CARGO_FEATURES=${{ env.RENDER_BACKEND_CARGO_FEATURES }}
            BACKEND_CARGO_NO_DEFAULT_FEATURES=true
          cache-from: type=gha,scope=ci-render-backend-image
          cache-to: type=gha,mode=max,scope=ci-render-backend-image

  backend-rust-quality:
    name: Backend Rust Quality
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend_quality == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: backend
        shell: bash
        env:
          QUALITY_TARGETS: ${{ needs.changes.outputs.backend_quality_targets }}
          SQLX_OFFLINE: true
        run: |
          set -euo pipefail
          mapfile -t targets < <(python3 - "$QUALITY_TARGETS" <<'PY'
          import json
          import sys

          for item in json.loads(sys.argv[1]):
              print(item)
          PY
          )

          for target in "${targets[@]}"; do
            case "$target" in
              api-render)
                cargo clippy -p music-streaming-blocklist-backend --all-targets --no-default-features --features render-api -- -D warnings
                ;;
              core)
                cargo clippy -p ndith-core --all-targets --all-features -- -D warnings
                ;;
              db)
                cargo clippy -p ndith-db --all-targets --all-features -- -D warnings
                ;;
              services)
                cargo clippy -p ndith-services --all-targets --all-features -- -D warnings
                ;;
              news)
                cargo clippy -p ndith-news --all-targets --all-features -- -D warnings
                ;;
              analytics)
                cargo clippy -p ndith-analytics --all-targets --no-default-features -- -D warnings
                ;;
              analytics-graph-ladybugdb)
                cargo clippy -p ndith-analytics --all-targets --no-default-features --features graph-ladybugdb -- -D warnings
                ;;
              *)
                echo "Unknown quality target: $target"
                exit 1
                ;;
            esac
          done

  backend-component-build:
    name: Backend Component Builds (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend_build_required == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.changes.outputs.backend_build_matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build backend component
        working-directory: backend
        env:
          SQLX_OFFLINE: true
          RUST_LOG: warn
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            api)
              cargo build -p music-streaming-blocklist-backend --bin music-streaming-blocklist-backend
              ;;
            api-render)
              cargo build -p music-streaming-blocklist-backend --bin music-streaming-blocklist-backend --no-default-features --features render-api
              ;;
            core)
              cargo build -p ndith-core
              ;;
            db)
              cargo build -p ndith-db
              ;;
            services)
              cargo build -p ndith-services
              ;;
            news)
              cargo build -p ndith-news
              ;;
            analytics)
              cargo build -p ndith-analytics --no-default-features
              ;;
            analytics-graph-ladybugdb)
              cargo build -p ndith-analytics --features graph-ladybugdb
              ;;
            api-graph-ladybugdb)
              cargo build -p music-streaming-blocklist-backend --bin music-streaming-blocklist-backend --features graph-ladybugdb
              ;;
            *)
              echo "Unknown build target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

  backend-component-test:
    name: Backend Component Tests (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend_test_required == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.changes.outputs.backend_test_matrix) }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run backend component coverage
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          SQLX_OFFLINE: true
          RUST_LOG: warn
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            api)
              cargo test -p music-streaming-blocklist-backend --no-default-features --features render-api --lib
              cargo test -p music-streaming-blocklist-backend --no-default-features --features render-api --test auth_service_unit_tests
              cargo test -p music-streaming-blocklist-backend --no-default-features --features render-api --test integration_tests
              cargo test -p music-streaming-blocklist-backend --no-default-features --features render-api --test entity_resolution_unit_tests
              cargo test -p music-streaming-blocklist-backend --no-default-features --features render-api --test end_to_end_workflow_tests
              cargo test -p music-streaming-blocklist-backend --no-default-features --features render-api --test dnp_api_integration_test
              cargo test -p music-streaming-blocklist-backend --no-default-features --features render-api --test dnp_list_integration_tests
              cargo test -p music-streaming-blocklist-backend --no-default-features --features render-api --test dnp_list_tests
              ;;
            core)
              cargo test -p ndith-core
              ;;
            db)
              cargo test -p ndith-db
              ;;
            services)
              cargo test -p ndith-services
              ;;
            news)
              cargo test -p ndith-news
              ;;
            analytics)
              cargo test -p ndith-analytics --no-default-features
              ;;
            analytics-graph-ladybugdb)
              cargo test -p ndith-analytics --no-default-features --features graph-ladybugdb
              ;;
            *)
              echo "Unknown test target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

  frontend-unit-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linting
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        working-directory: frontend
        run: npm test -- --run

  e2e-test:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        render-backend-image-smoke,
        backend-rust-quality,
        backend-component-build,
        backend-component-test,
        frontend-unit-test,
      ]
    if: >-
      ${{
        always() &&
        needs.changes.outputs.e2e == 'true' &&
        contains(fromJSON('["success","skipped"]'), needs.render-backend-image-smoke.result) &&
        contains(fromJSON('["success","skipped"]'), needs.backend-rust-quality.result) &&
        contains(fromJSON('["success","skipped"]'), needs.backend-component-build.result) &&
        contains(fromJSON('["success","skipped"]'), needs.backend-component-test.result) &&
        contains(fromJSON('["success","skipped"]'), needs.frontend-unit-test.result)
      }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build backend
        working-directory: backend
        run: cargo build --release -p music-streaming-blocklist-backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          RUST_LOG: warn
          PORT: 3000
        run: |
          ./target/release/music-streaming-blocklist-backend &
          sleep 10
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3000/health

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:5000
          E2E_SKIP_SERVER: false
        run: npx playwright test --project=chromium --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: frontend/test-results/
          retention-days: 7

  e2e-cross-browser:
    name: Cross-Browser E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, e2e-test]
    if: >-
      ${{
        always() &&
        github.ref == 'refs/heads/main' &&
        needs.changes.outputs.e2e == 'true' &&
        needs.e2e-test.result == 'success'
      }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build backend
        working-directory: backend
        run: cargo build --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          RUST_LOG: warn
          PORT: 3000
        run: |
          ./target/release/music-streaming-blocklist-backend &
          sleep 10
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3000/health

      - name: Run E2E tests (${{ matrix.browser }})
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:5000
          E2E_SKIP_SERVER: false
        run: npx playwright test --project=${{ matrix.browser }} --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/playwright-report/
          retention-days: 30

  apple-music-sandbox:
    name: Apple Music Sandbox Tests
    runs-on: ubuntu-latest
    needs: [changes, backend-component-build, backend-component-test]
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.changes.outputs.apple_music_sandbox == 'true' &&
        contains(fromJSON('["success","skipped"]'), needs.backend-component-build.result) &&
        contains(fromJSON('["success","skipped"]'), needs.backend-component-test.result)
      }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Apple Music credentials
        id: check-creds
        run: |
          if [[ -n "${{ secrets.APPLE_MUSIC_TEAM_ID }}" ]] && \
             [[ -n "${{ secrets.APPLE_MUSIC_KEY_ID }}" ]] && \
             [[ -n "${{ secrets.APPLE_MUSIC_PRIVATE_KEY }}" ]]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
            echo "::warning::Apple Music credentials not configured. Skipping sandbox tests."
          fi

      - name: Install Rust toolchain
        if: steps.check-creds.outputs.has_credentials == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        if: steps.check-creds.outputs.has_credentials == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo dependencies
        if: steps.check-creds.outputs.has_credentials == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Apple Music private key
        if: steps.check-creds.outputs.has_credentials == 'true'
        run: |
          echo "${{ secrets.APPLE_MUSIC_PRIVATE_KEY }}" > /tmp/apple_music_key.p8

      - name: Run Apple Music sandbox tests
        if: steps.check-creds.outputs.has_credentials == 'true'
        working-directory: backend
        env:
          APPLE_MUSIC_TEAM_ID: ${{ secrets.APPLE_MUSIC_TEAM_ID }}
          APPLE_MUSIC_KEY_ID: ${{ secrets.APPLE_MUSIC_KEY_ID }}
          APPLE_MUSIC_KEY_PATH: /tmp/apple_music_key.p8
          APPLE_MUSIC_SANDBOX_TEST: "1"
        run: |
          cargo test --test apple_music_sandbox_tests -- --ignored --nocapture

      - name: Cleanup private key
        if: always()
        run: rm -f /tmp/apple_music_key.p8

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        render-backend-image-smoke,
        backend-rust-quality,
        backend-component-build,
        backend-component-test,
        frontend-unit-test,
        e2e-test,
        e2e-cross-browser,
        apple-music-sandbox,
      ]
    if: always()

    steps:
      - name: Check all jobs passed or were skipped
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "Change detection failed"
            exit 1
          fi

          results=(
            "${{ needs.render-backend-image-smoke.result }}"
            "${{ needs.backend-rust-quality.result }}"
            "${{ needs.backend-component-build.result }}"
            "${{ needs.backend-component-test.result }}"
            "${{ needs.frontend-unit-test.result }}"
            "${{ needs.e2e-test.result }}"
            "${{ needs.e2e-cross-browser.result }}"
            "${{ needs.apple-music-sandbox.result }}"
          )

          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed"
              exit 1
            fi
          done

          echo "All CI checks passed!"
