name: Publish Render Frontend Image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-frontend-image.yml
      - frontend/**
      - render.yaml
  workflow_dispatch:
    inputs:
      deploy_to_render:
        description: Trigger the Render deploy after publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: render-frontend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPO: ghcr.io/kcirtapfromspace/ndith-frontend

jobs:
  publish:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_NDITH_FRONTEND_DEPLOY_HOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive build variables
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_REPO}:${GITHUB_SHA::7}"
            if [ "${GITHUB_REF}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
              echo "${IMAGE_REPO}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.render
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.vars.outputs.tags }}
          build-args: |
            VITE_CONVEX_URL=${{ secrets.CONVEX_URL }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=render-frontend-image
          cache-to: type=gha,mode=max,scope=render-frontend-image

      - name: Resolve Render frontend service id
        id: render_service
        if: ${{ env.RENDER_API_KEY != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_to_render != 'false') }}
        continue-on-error: true
        run: |
          response="$(
            curl --fail --silent --show-error \
              --url "https://api.render.com/v1/services" \
              --header "Authorization: Bearer ${RENDER_API_KEY}"
          )"

          service_id="$(
            jq -r '
              (if type == "array" then .
               elif type == "object" then (.services // .items // .results // [.])
               else []
               end)
              | map(if (.service | type) == "object" then .service else . end)
              | map(select(.name == "ndith-frontend") | .id)
              | .[0] // empty
            ' <<<"${response}"
          )"

          if [ -n "${service_id}" ]; then
            echo "service_id=${service_id}" >> "$GITHUB_OUTPUT"
            echo "Resolved Render frontend service id: ${service_id}"
          else
            echo "::warning::Render frontend service not found; image published only."
          fi

      - name: Trigger Render frontend deploy hook
        id: deploy_hook
        if: ${{ steps.render_service.outputs.service_id == '' && env.RENDER_FRONTEND_DEPLOY_HOOK_URL != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_to_render != 'false') }}
        run: |
          echo "No Render service id resolved via API. Falling back to deploy hook."
          curl --fail --silent --show-error \
            --request POST \
            --url "${RENDER_FRONTEND_DEPLOY_HOOK_URL}"
          echo "Render frontend deploy hook triggered."
          echo "hook_triggered=true" >> "$GITHUB_OUTPUT"

      - name: Update Render service image
        if: ${{ steps.render_service.outputs.service_id != '' }}
        run: |
          image_tag="${IMAGE_REPO}:${{ steps.vars.outputs.short_sha }}"
          echo "Updating Render service image to: ${image_tag}"

          # Update the service to use the new image (works for image-backed services)
          update_response="$(
            curl --silent --show-error --write-out "\n%{http_code}" \
              --request PATCH \
              --url "https://api.render.com/v1/services/${{ steps.render_service.outputs.service_id }}" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Content-Type: application/json" \
              --data '{"image": {"ownerId": "'"$(echo "${image_tag}" | cut -d/ -f1-2)"'", "imagePath": "'"${image_tag}"'"}}'
          )"
          update_code="$(echo "${update_response}" | tail -1)"
          echo "Update status: ${update_code}"

      - name: Trigger Render frontend deploy
        if: ${{ steps.render_service.outputs.service_id != '' }}
        run: |
          image_tag="${IMAGE_REPO}:${{ steps.vars.outputs.short_sha }}"

          # Try with imageUrl first (image-backed service), fall back to empty body (docker service)
          deploy_response="$(
            curl --silent --show-error --write-out "\n%{http_code}" \
              --request POST \
              --url "https://api.render.com/v1/services/${{ steps.render_service.outputs.service_id }}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Content-Type: application/json" \
              --data '{"imageUrl": "'"${image_tag}"'"}'
          )"
          http_code="$(echo "${deploy_response}" | tail -1)"
          body="$(echo "${deploy_response}" | sed '$d')"

          if [ "${http_code}" = "400" ]; then
            echo "imageUrl deploy returned 400, retrying without imageUrl..."
            deploy_response="$(
              curl --fail --silent --show-error \
                --request POST \
                --url "https://api.render.com/v1/services/${{ steps.render_service.outputs.service_id }}/deploys" \
                --header "Authorization: Bearer ${RENDER_API_KEY}" \
                --header "Content-Type: application/json" \
                --data '{}'
            )"
            body="${deploy_response}"
          elif [ "${http_code}" -ge 400 ]; then
            echo "::error::Render deploy API returned HTTP ${http_code}: ${body}"
            exit 1
          fi

          echo "Deploy response: ${body}"
          deploy_status="$(echo "${body}" | jq -r '.status // empty')"
          deploy_id="$(echo "${body}" | jq -r '.id // empty')"
          echo "Deploy ID: ${deploy_id}, Status: ${deploy_status}"
          if [ "${deploy_status}" = "build_failed" ] || [ "${deploy_status}" = "deactivated" ]; then
            echo "::error::Render deploy failed with status: ${deploy_status}"
            exit 1
          fi

      - name: Summarize
        run: |
          echo "Published frontend image tags:"
          echo "${{ steps.vars.outputs.tags }}"
          if [ -n "${{ steps.render_service.outputs.service_id }}" ]; then
            echo "Triggered Render deploy for ndith-frontend (${{ steps.render_service.outputs.service_id }})"
          elif [ "${{ steps.deploy_hook.outputs.hook_triggered }}" = "true" ]; then
            echo "Triggered Render frontend deploy via deploy hook."
          else
            echo "Image published to GHCR only."
          fi
